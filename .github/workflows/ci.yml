name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        env:
          # Remove after the upstream v2 punycode warning is fixed:
          # https://github.com/Swatinem/rust-cache/issues/331
          NODE_OPTIONS: --disable-warning=DEP0040
        with:
          workspaces: src-tauri -> target
          shared-key: windows-release
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare ASR resource
        run: pnpm asr:prepare-resource

      - name: Run frontend tests
        run: pnpm test

      - name: Typecheck frontend
        run: pnpm exec tsc --noEmit

      - name: Run Rust tests
        run: cargo test --release --lib --manifest-path src-tauri/Cargo.toml
