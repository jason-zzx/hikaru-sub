name: Release Desktop Clients

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, for example v0.1.0-rc.1"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - label: Windows
            platform: windows-latest
            target: ""
            args: ""
          # TODO(macOS): re-enable after the macOS bundle/resource layout is verified.
          # - label: macOS Intel
          #   platform: macos-15-intel
          #   target: x86_64-apple-darwin
          #   args: "--target x86_64-apple-darwin"
          # - label: macOS Apple Silicon
          #   platform: macos-15
          #   target: aarch64-apple-darwin
          #   args: "--target aarch64-apple-darwin"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare ASR resource
        run: pnpm asr:prepare-resource

      - name: Run frontend tests
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # TODO(macOS): re-enable together with macOS matrix entries.
          # APPLE_SIGNING_IDENTITY: "-"
        with:
          projectPath: .
          args: ${{ matrix.args }}
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: Hikaru Sub ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseBody: |
            Hikaru Sub desktop client release.

            FFmpeg and Python 3.11 are prepared on demand after installation.
            The app reuses system dependencies first and downloads managed copies only after user confirmation.
            ASR engine dependencies and model weights are configured after installation.
            This workflow currently uploads Windows bundles only.
            Windows currently ships the NSIS setup package and a portable zip; MSI is disabled until the installer UX is revisited.
            macOS packages are temporarily disabled pending bundle/resource validation.
            Linux packages are intentionally deferred until Windows/macOS releases are stable.
            Windows packages are not code-signed and may show SmartScreen warnings.
          releaseDraft: true
          prerelease: ${{ contains(github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name, '-') }}
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false

      - name: Create portable zip
        run: pnpm release:portable

      - name: Upload portable zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: gh release upload "$env:RELEASE_TAG" src-tauri/target/release/bundle/portable/*.zip --clobber
